<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Projects by Mamdouh Ahmed Attia - Flutter mobile apps, ML/AI projects, and systems engineering.">
    <title>Projects | Mamdouh Ahmed Attia</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto:wght@300;400;500&display=swap"
        rel="stylesheet">

    <!-- Theme Initialization - Preventing FOUC -->
    <script>
        (function () {
            const THEME_KEY = 'portfolio-theme';
            const storedTheme = localStorage.getItem(THEME_KEY);
            const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', storedTheme || systemTheme);
        })();
    </script>

    <link rel="stylesheet" href="../css/design-tokens.css">
    <link rel="stylesheet" href="../css/globals.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/animations.css">
    <link rel="stylesheet" href="../css/layouts.css">
    <link rel="stylesheet" href="../css/rtl.css">

    <link rel="icon" type="image/png" href="../assets/images/logo.png"><text y='.9em' font-size='90'>👨‍💻</text></svg>">
</head>

<body>
    <!-- Header Anchor -->
    <div id="site-header"></div>

    <main class="main page-enter" id="main-content">
        <!-- Page Header -->
        <div class="page-header">
            <div class="container">
                <h1 class="page-title reveal" data-i18n="projects.title">Projects</h1>
                <p class="page-description reveal" data-i18n="projects.subtitle">Real solutions built for real clients
                </p>
            </div>
        </div>

        <div class="page-content">
            <div class="container">
                <!-- Filters -->
                <div class="filters reveal">
                    <div class="filter-row">
                        <div class="search-wrapper">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <circle cx="11" cy="11" r="8" />
                                <path d="m21 21-4.35-4.35" />
                            </svg>
                            <input type="text" class="form-input search-input" id="search"
                                placeholder="Search projects...">
                        </div>

                        <div class="view-toggle">
                            <button class="btn btn-icon btn-ghost active" data-view="grid" aria-label="Grid view">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <rect x="3" y="3" width="7" height="7" />
                                    <rect x="14" y="3" width="7" height="7" />
                                    <rect x="14" y="14" width="7" height="7" />
                                    <rect x="3" y="14" width="7" height="7" />
                                </svg>
                            </button>
                            <button class="btn btn-icon btn-ghost" data-view="list" aria-label="List view">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2">
                                    <line x1="8" y1="6" x2="21" y2="6" />
                                    <line x1="8" y1="12" x2="21" y2="12" />
                                    <line x1="8" y1="18" x2="21" y2="18" />
                                    <line x1="3" y1="6" x2="3.01" y2="6" />
                                    <line x1="3" y1="12" x2="3.01" y2="12" />
                                    <line x1="3" y1="18" x2="3.01" y2="18" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="category-tabs">
                        <button class="category-tab active" data-category="all">All</button>
                        <button class="category-tab" data-category="featured">Featured</button>
                        <button class="category-tab" data-category="mobile">Mobile</button>
                        <button class="category-tab" data-category="dart">Dart</button>
                        <button class="category-tab" data-category="cpp">C++</button>
                        <button class="category-tab" data-category="java">Java</button>
                        <button class="category-tab" data-category="hardware">Hardware</button>
                    </div>
                </div>

                <!-- Projects Grid -->
                <div class="projects-grid grid-3" id="projects-container">
                    <!-- Projects will be injected by JavaScript -->
                </div>

                <!-- Empty State -->
                <div class="empty-state hidden" id="empty-state">
                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                        <circle cx="11" cy="11" r="8" />
                        <path d="m21 21-4.35-4.35" />
                    </svg>
                    <h3>No projects found</h3>
                    <p>Try adjusting your search or filters</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Project Modal -->
    <div id="project-modal" class="modal">
        <div class="modal-header">
            <h3 id="modal-title" class="modal-title"></h3>
            <button class="modal-close" onclick="closeModal('project-modal')" aria-label="Close modal">&times;</button>
        </div>
        <div id="modal-body" class="modal-body">
            <!-- Dynamic Content -->
        </div>
    </div>

    <!-- Lightbox for Image Zooming -->
    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <button class="lightbox-close">&times;</button>
        <img id="lightbox-img" src="" alt="Zoomed View">
    </div>

    <div id="modal-backdrop" class="modal-backdrop" onclick="closeModal('project-modal')"></div>

    <!-- Footer Anchor -->
    <div id="site-footer"></div>

    <script type="module" src="../js/main.js"></script>
    <script type="module">
        import { projects, getProjectsByCategory, getProjectBySlug } from '../js/data/projects.js';

        let currentCategory = 'all';
        let currentView = 'grid';
        let searchQuery = '';

        function renderProjects(projectList) {
            console.log('Rendering projects:', projectList.length);
            const container = document.getElementById('projects-container');
            const emptyState = document.getElementById('empty-state');

            if (!container) return;

            if (projectList.length === 0) {
                container.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');

            container.innerHTML = projectList.map(project => {
                const title = project.i18nKey ? window.t(project.i18nKey + '.title', project.title) : project.title;
                const description = project.i18nKey ? window.t(project.i18nKey + '.overview', "") : (project.description || "");
                const subtitle = project.i18nKey ? window.t(project.i18nKey + '.subtitle', '') : '';
                const categoryLabel = window.t('projects.categories.' + project.category, project.category);

                // ENHANCED COVER FINDING Logic
                let coverImg = null;
                if (project.media && Array.isArray(project.media)) {
                    // Try to find first image
                    const imgMedia = project.media.find(m => m.type === 'image');
                    if (imgMedia) coverImg = imgMedia.src;

                    // Fallback to youtube thumbnail if no image found
                    if (!coverImg) {
                        const ytMedia = project.media.find(m => m.type === 'youtube');
                        if (ytMedia) coverImg = `https://img.youtube.com/vi/${ytMedia.src}/maxresdefault.jpg`;
                    }
                }

                // Final fallback to legacy images array
                if (!coverImg && project.images && project.images.length > 0) {
                    coverImg = project.images[0];
                }

                const auraStyle = project.color ? `--aura-color: ${project.color}44;` : '';

                if (currentView === 'list') {
                    return `
                    <div class="card project-card wide-card reveal" data-slug="${project.slug}" style="${auraStyle}">
                        <div class="card-image ${coverImg ? '' : 'no-image'}">
                            ${coverImg ? `<img src="${coverImg}" alt="${title}">` : `<div class="project-placeholder">${project.category.toUpperCase()}</div>`}
                        </div>
                        <div class="card-content">
                            <div class="card-meta">
                                ${project.featured ? '<span class="badge badge-primary">Featured</span>' : ''}
                                <span class="badge">${categoryLabel}</span>
                                <span class="badge badge-outline">${project.date || ''}</span>
                            </div>
                            <h3 class="card-title">${title}</h3>
                            <p class="card-subtitle" style="color: var(--color-primary); font-size: var(--text-sm); font-weight: 600; margin-bottom: var(--space-3);">${subtitle}</p>
                            <p class="card-description">${description}</p>
                            
                            <div class="card-details" style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-4); margin-top: auto;">
                                <div class="detail-item">
                                    <strong style="color: var(--text-tertiary); display: block; font-size: 0.7rem; text-transform: uppercase;">Tech Stack</strong>
                                    <div class="tags" style="margin-top: 5px;">
                                        ${(project.techStack || []).slice(0, 3).map(tech => `<span class="badge badge-sm">${tech}</span>`).join('')}
                                    </div>
                                </div>
                                <div class="detail-item" style="text-align: right; display: flex; align-items: flex-end; justify-content: flex-end;">
                                    <button class="btn btn-primary btn-sm" onclick="showProject('${project.slug}')">
                                        Explore Case Study →
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>`;
                }

                return `
                <div class="card project-card reveal" data-slug="${project.slug}" style="${auraStyle} cursor:pointer;" onclick="showProject('${project.slug}')">
                  <div class="card-image ${coverImg ? '' : 'no-image'}">
                    ${coverImg ? `<img src="${coverImg}" alt="${title}">` : `<div class="project-placeholder">${project.category.toUpperCase()}</div>`}
                  </div>
                  <div class="card-content">
                    <div class="card-meta">
                      ${project.featured ? '<span class="badge badge-primary">Featured</span>' : ''}
                      <span class="badge">${categoryLabel}</span>
                    </div>
                    <h3 class="card-title">${title}</h3>
                    <p class="card-description">${description}</p>
                    <div class="card-footer" style="margin-top: auto; display: flex; align-items: center; justify-content: space-between;">
                      <div class="tags" style="display: flex; gap: 4px;">
                        ${(project.techStack || []).slice(0, 2).map(tag => `<span class="badge">${tag}</span>`).join('')}
                      </div>
                      <div class="card-actions" style="display: flex; align-items: center; gap: 8px;">
                        ${project.githubUrl ? `<a aria-label="GitHub Repository" href="${project.githubUrl}" target="_blank" onclick="event.stopPropagation()" style="color: var(--text-secondary); transition: color 0.2s; display: flex;"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg></a>` : ''}
                        ${project.demoUrl || project.youtubeUrl ? `<a aria-label="YouTube Demo" href="${project.demoUrl || project.youtubeUrl}" target="_blank" onclick="event.stopPropagation()" style="color: var(--text-secondary); transition: color 0.2s; display: flex;"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg></a>` : ''}
                        <span class="btn btn-ghost btn-sm" style="pointer-events:none; padding: 4px 8px;">Details →</span>
                      </div>
                    </div>
                  </div>
                </div>`;
            }).join('');

            // Update container class
            container.className = currentView === 'grid' ? 'projects-grid grid-3' : 'projects-list-vertical';

            // Attach Aura Tracking
            document.querySelectorAll('.project-card').forEach(card => {
                card.onmousemove = (e) => {
                    const rect = card.getBoundingClientRect();
                    const x = ((e.clientX - rect.left) / rect.width) * 100;
                    const y = ((e.clientY - rect.top) / rect.height) * 100;
                    card.style.setProperty('--aura-x', `${x}%`);
                    card.style.setProperty('--aura-y', `${y}%`);
                };
            });

            // Manually trigger reveal for injected cards
            setTimeout(() => {
                container.querySelectorAll('.reveal').forEach((el, i) => {
                    setTimeout(() => el.classList.add('visible'), i * 100);
                });
            }, 50);
        }

        function filterProjects() {
            let filtered = currentCategory === 'all'
                ? projects
                : currentCategory === 'featured'
                    ? projects.filter(p => p.featured)
                    : getProjectsByCategory(currentCategory);

            if (searchQuery) {
                filtered = filtered.filter(p => {
                    const title = p.i18nKey ? window.t(p.i18nKey + '.title', p.title) : p.title;
                    return title.toLowerCase().includes(searchQuery.toLowerCase()) ||
                        p.tags.some(t => t.toLowerCase().includes(searchQuery.toLowerCase()));
                });
            }

            renderProjects(filtered);
        }

        function attachFilterListeners() {
            const categories = document.querySelectorAll('.category-tab');
            const viewButtons = document.querySelectorAll('.view-toggle button');
            const searchInput = document.getElementById('search');

            categories.forEach(tab => {
                tab.onclick = () => {
                    categories.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentCategory = tab.dataset.category;
                    filterProjects();
                };
            });

            viewButtons.forEach(btn => {
                btn.onclick = () => {
                    viewButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentView = btn.dataset.view;
                    filterProjects();
                };
            });

            if (searchInput) {
                searchInput.oninput = (e) => {
                    searchQuery = e.target.value;
                    filterProjects();
                };
            }
        }

        window.zoomImage = function (src) {
            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            img.src = src;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        };

        window.closeLightbox = function () {
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.remove('active');
            document.body.style.overflow = '';
        };

        window.showProject = function (slug) {
            const project = getProjectBySlug(slug);
            if (!project) return;

            const i18n = project.i18nKey;
            const title = i18n ? window.t(i18n + '.title', project.title) : project.title;
            const subtitle = i18n ? window.t(i18n + '.subtitle', '') : '';
            const overview = i18n ? window.t(i18n + '.overview', "") : (project.description || "");
            const challenge = i18n ? window.t(i18n + '.challenge', '') : (project.challenge || "");
            const approach = i18n ? window.t(i18n + '.approach', '') : (project.approach || "");
            const solution = i18n ? window.t(i18n + '.solution', '') : (project.solution || "");
            const contributions = i18n ? window.t(i18n + '.contributions', []) : (project.contributions || []);

            const color = project.color || 'var(--color-primary)';
            const auraColor = project.color ? `${project.color}33` : 'rgba(var(--color-primary-rgb), 0.2)';

            const hasMedia = (project.media && project.media.length > 0) || (project.images && project.images.length > 0);

            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-body').innerHTML = `
                <div class="modal-cinema-wrapper" style="--project-color: ${color}; --project-aura: ${auraColor}">
                    
                    <!-- TOP: HORIZONTAL CINEMATIC GALLERY -->
                    ${hasMedia ? `
                    <div class="modal-cinema-gallery">
                        <div class="media-slider-container">
                            <div class="media-slider" id="modal-media-slider">
                                ${(project.media && project.media.length > 0) ?
                        project.media.map((item, index) => `
                                        <div class="media-slide" data-index="${index}">
                                            ${item.type === 'youtube' ?
                                `<div class="video-wrapper ${item.isShort ? 'is-portrait' : 'is-landscape'}"><iframe src="https://www.youtube.com/embed/${item.src}?autoplay=0&rel=0" allowfullscreen loading="lazy"></iframe></div>` :
                                `<div class="image-wrapper"><img src="${item.src}" alt="${title} Screen" onclick="zoomImage('${item.src}')" loading="lazy"></div>`
                            }
                                        </div>
                                    `).join('') :
                        `<div class="media-slide"><div class="project-placeholder-mini">${project.category.toUpperCase()}</div></div>`
                    }
                            </div>
                            
                            ${(project.media && project.media.length > 1) ? `
                                <div class="slider-nav">
                                    <button class="slider-arrow prev" onclick="moveSlider(-1)" aria-label="Previous">
                                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"></polyline></svg>
                                    </button>
                                    <button class="slider-arrow next" onclick="moveSlider(1)" aria-label="Next">
                                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"></polyline></svg>
                                    </button>
                                </div>
                            ` : ''}
                        </div>

                        <!-- THUMBNAIL CAROUSEL -->
                        ${(project.media && project.media.length > 1) ? `
                            <div class="thumbnail-carousel-wrapper">
                                <div class="thumbnail-carousel" id="thumb-carousel">
                                    ${project.media.map((item, index) => `
                                        <div class="thumb-item ${index === 0 ? 'active' : ''}" onclick="goToSlide(${index})" data-index="${index}">
                                            ${item.type === 'youtube' ?
                            `<div class="thumb-vid-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5.14v14c0 .86.84 1.4 1.58.97l11-7c.73-.46.73-1.48 0-1.94l-11-7c-.74-.43-1.58.11-1.58.97z"/></svg></div>` :
                            `<img src="${item.src}" alt="Thumb ${index}">`
                        }
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        ` : ''}
                    </div>
                    ` : ''}

                    <!-- BOTTOM: 2-COLUMN CONTENT -->
                    <div class="modal-detail-content">
                        <aside class="modal-sidebar">
                            <div class="sidebar-info-group">
                                <h4 class="sidebar-group-title">Project Context</h4>
                                <div class="sidebar-meta">
                                    <div class="meta-item">
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                                        <span>${project.date || 'Present'}</span>
                                    </div>
                                    <div class="meta-item">
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                                        <span>${project.category.toUpperCase()}</span>
                                    </div>
                                </div>
                            </div>

                            <div class="sidebar-info-group">
                                <h4 class="sidebar-group-title">Technologies</h4>
                                <div class="tags">
                                    ${(project.techStack || []).map(tech => `<span class="badge badge-primary">${tech}</span>`).join('')}
                                </div>
                            </div>

                            <div class="sidebar-info-group actions">
                                ${project.demoUrl ? `<a href="${project.demoUrl}" class="btn btn-primary" target="_blank">View Demo</a>` : ''}
                                ${project.repoUrl ? `<a href="${project.repoUrl}" class="btn btn-secondary" target="_blank">Source Code</a>` : ''}
                                ${project.githubUrl ? `<a href="${project.githubUrl}" class="btn btn-secondary" target="_blank">GitHub Repo</a>` : ''}
                                ${project.youtubeUrl ? `<a href="${project.youtubeUrl.replace('/embed/', '/watch?v=').replace('?', '&').replace('watch?v=', 'watch?v=')}" class="btn btn-ghost" target="_blank" style="display:flex;align-items:center;gap:6px;"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2 31.7 31.7 0 0 0 0 12a31.7 31.7 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1C4.5 20.5 12 20.5 12 20.5s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1A31.7 31.7 0 0 0 24 12a31.7 31.7 0 0 0-.5-5.8zM9.7 15.5V8.5l6.3 3.5-6.3 3.5z"/></svg>Watch Demo</a>` : ''}
                            </div>
                        </aside>

                        <main class="modal-main">
                            <header class="modal-main-header">
                                ${subtitle ? `<p class="project-eyebrow">${subtitle}</p>` : ''}
                                <h2 class="project-title-large">${title}</h2>
                                <p class="project-summary">${overview}</p>
                            </header>

                            <div class="story-timeline">
                                ${challenge ? `<div class="storytelling-block"><h4 class="section-label">THE CHALLENGE</h4><div class="story-text">${challenge}</div></div>` : ''}
                                ${approach ? `<div class="storytelling-block"><h4 class="section-label">MY APPROACH</h4><div class="story-text">${approach}</div></div>` : ''}
                                ${solution ? `<div class="storytelling-block"><h4 class="section-label">THE SOLUTION</h4><div class="story-text">${solution}</div></div>` : ''}
                                ${Array.isArray(contributions) && contributions.length > 0 ? `
                                    <div class="storytelling-block">
                                        <h4 class="section-label">PERSONAL CONTRIBUTIONS</h4>
                                        <ul class="contributions-list">
                                            ${contributions.map(c => `<li>${c}</li>`).join('')}
                                        </ul>
                                    </div>
                                ` : ''}
                            </div>
                        </main>
                    </div>
                </div>
            `;

            // Slider Logic
            const slider = document.getElementById('modal-media-slider');
            const thumbs = document.querySelectorAll('.thumb-item');

            if (slider) {
                window.moveSlider = (direction) => {
                    const scrollAmount = slider.offsetWidth;
                    slider.scrollBy({ left: direction * scrollAmount, behavior: 'smooth' });
                };

                window.goToSlide = (index) => {
                    const scrollAmount = slider.offsetWidth;
                    slider.scrollTo({ left: index * scrollAmount, behavior: 'smooth' });
                };

                slider.onscroll = () => {
                    const index = Math.round(slider.scrollLeft / slider.offsetWidth);
                    thumbs.forEach((t, i) => t.classList.toggle('active', i === index));

                    // Keep active thumb in view
                    const activeThumb = document.querySelector('.thumb-item.active');
                    if (activeThumb) activeThumb.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                };
            }

            // Aura Effect for Modal
            const wrapper = document.querySelector('.modal-cinema-wrapper');
            if (wrapper) {
                wrapper.onmousemove = (e) => {
                    const rect = wrapper.getBoundingClientRect();
                    const x = ((e.clientX - rect.left) / rect.width) * 100;
                    const y = ((e.clientY - rect.top) / rect.height) * 100;
                    wrapper.style.setProperty('--aura-x', `${x}%`);
                    wrapper.style.setProperty('--aura-y', `${y}%`);
                };
            }

            openModal('project-modal');
        };

        const init = () => {
            console.log('Initializing projects page...');
            filterProjects();
            attachFilterListeners();
            // Re-render when language changes
            document.addEventListener('languageChanged', filterProjects);
        };

        if (window.i18nReady) init();
        else document.addEventListener('i18nReady', init);
    </script>
